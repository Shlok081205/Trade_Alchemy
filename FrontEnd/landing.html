<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHarvest AI | Stock Analysis & AI Predictions</title>
    <link rel="stylesheet" href="landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-wrapper">
            <div class="header-content">
                <a href="landing.html" class="logo" style="text-decoration: none;">
                    <div class="logo-icon"></div>
                    <span class="logo-text">StockHarvest <span class="logo-accent">AI</span></span>
                </a>
                
                <nav class="nav">
                    <a href="landing.html" class="nav-link">Home</a>
                    <a href="#" class="nav-link">AI Predictions</a>
                    <a href="#" class="nav-link">Watchlist</a>
                    <a href="learn.html" class="nav-link">Learn</a>
                </nav>
                
                <div class="header-actions">
                    <button class="btn-account">Account</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="hero-wrapper">
            <div class="hero">
                <!-- Large Logo -->
                <div class="hero-logo">
                    <div class="hero-logo-icon"></div>
                    <h1 class="hero-title">StockHarvest<span class="title-accent">AI</span></h1>
                </div>
                
                <!-- Tagline -->
                <p class="hero-tagline">Stock analysis and AI predictions for investors in India.</p>
                
                <!-- Search Box -->
                <div class="search-wrapper">
                    <div class="search-box">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM18 18l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <input 
                            type="text" 
                            class="search-input" 
                            placeholder="Search by ticker symbol"
                            autocomplete="off"
                        >
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-wrapper">
            <div class="footer-content">
                <div class="footer-left">
                    <div class="footer-logo">
                        <div class="footer-logo-icon"></div>
                        <span class="footer-logo-text">StockHarvest<span class="footer-accent">AI</span></span>
                    </div>
                    <p class="footer-description">A semester-3 project by students</p>
                    <a href="aboutus.html" class="footer-about">About us</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
