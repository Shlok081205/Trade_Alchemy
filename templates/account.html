<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account | TradeAlchemy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Specific Styles for Account Page */
        .account-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* Left Column: Profile Card */
        .profile-sidebar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            height: fit-content;
        }

        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-purple);
            padding: 4px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .user-tag {
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent-purple);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Right Column: Content Sections */
        .account-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title { font-size: 1.2rem; font-weight: 600; color: var(--text-main); }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }

        .form-input {
            width: 100%;
            background: #121212;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: var(--font-primary);
        }

        .form-input:disabled { opacity: 0.7; cursor: not-allowed; }
        .form-input:focus { border-color: var(--accent-purple); outline: none; }

        /* Watchlist Preview */
        .watchlist-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
        }

        /* Responsive */
        @media (max-width: 800px) {
            .account-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="dashboard.html" class="logo-link">
                <div class="logo"><img src="/static/images/logo.png" alt="Logo" class="logo-img"><span class="logo-text">TradeAlchemy</span></div>
            </a>
            <nav class="nav">
                <a href="dashboard.html" class="nav-link">Home</a>
                <a href="watchlist.html" class="nav-link">Watchlist</a>
            </nav>
            <div class="header-actions">
                <div class="account-icon" style="background: var(--accent-purple); color: white;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
        </div>
    </header>

    <main class="main" style="padding-top: 50px;">
        <div class="account-grid">

            <div class="profile-sidebar">
                <img src="https://ui-avatars.com/api/?name=User&background=A855F7&color=fff" alt="Profile" class="profile-avatar-large">
                <div class="user-tag">Verified Member</div>
                <h2 id="display-name" style="margin-bottom: 5px;">Loading...</h2>
                <p id="display-email" style="color: var(--text-muted); margin-bottom: 30px;">...</p>

                <button id="logout-btn" class="ai-mode-btn" style="width: 100%; justify-content: center; background: rgba(248, 113, 113, 0.1); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2);">
                    Logout
                </button>
            </div>

            <div class="account-content">

                <div class="account-section">
                    <div class="section-header">
                        <span class="section-title">Personal Information</span>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" class="form-input" id="info-username" disabled>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-input" id="info-email" disabled>
                        </div>
                    </div>
                </div>

                <div class="account-section">
                    <div class="section-header">
                        <span class="section-title">Security</span>
                    </div>
                    <form id="password-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="old-pass" class="form-input" placeholder="••••••••" required>
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="new-pass" class="form-input" placeholder="Min 8 chars" required>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <button type="submit" class="ai-mode-btn" style="background: var(--accent-purple); border: none; padding: 10px 24px;">
                                Update Password
                            </button>
                        </div>
                    </form>
                </div>

                <div class="account-section">
                    <div class="section-header" style="border: none; margin-bottom: 10px;">
                        <span class="section-title">My Watchlist</span>
                        <a href="watchlist.html" style="color: var(--accent-gold); text-decoration: none; font-size: 0.9rem;">View All →</a>
                    </div>
                    <div class="watchlist-preview">
                        <div>
                            <h3 style="margin-bottom: 5px;">Tracked Stocks</h3>
                            <p style="color: var(--text-muted); font-size: 0.9rem;">Manage your portfolio and track live prices.</p>
                        </div>
                        <div class="account-icon" style="background: rgba(255, 215, 0, 0.1); color: var(--accent-gold);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 6l-9.5 9.5-5-5L1 18"></path></svg>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-wrapper">
            <div class="footer-left">
                <a href="dashboard.html" class="logo-link">
                    <div class="logo"><img src="/static/images/logo.png" alt="Logo" class="logo-img"><span class="logo-text">TradeAlchemy</span></div>
                </a>
                <p class="footer-description">Semester 3 Project</p>
            </div>
            <div class="footer-right">
                <div class="footer-col"><h4>About us</h4><a href="team.html">Team</a><a href="journey.html">Journey</a></div>
                <div class="footer-col"><h4>Learn</h4><a href="stock_market.html">Stock Market</a><a href="ai_ml.html">AI ML</a></div>
            </div>
        </div>
    </footer>

    <script>
        // 1. Fetch User Info on Load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/user_info');
                const data = await response.json();

                if (data.success) {
                    // Populate Profile Card
                    document.getElementById('display-name').innerText = data.user.username;
                    document.getElementById('display-email').innerText = data.user.email;

                    // Populate Inputs
                    document.getElementById('info-username').value = data.user.username;
                    document.getElementById('info-email').value = data.user.email;

                    // Update Profile Image if username exists (using UI Avatars as fallback)
                    const avatarUrl = `https://ui-avatars.com/api/?name=${data.user.username}&background=A855F7&color=fff`;
                    document.querySelector('.profile-avatar-large').src = '/account.jpg';
                    document.querySelector('.profile-avatar-large').onerror = function() {
                        this.src = avatarUrl;
                    };
                }
            } catch (error) {
                console.error('Failed to load user info', error);
            }
        });

        // 2. Handle Password Change
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Updating...";
            btn.disabled = true;

            const oldPass = document.getElementById('old-pass').value;
            const newPass = document.getElementById('new-pass').value;

            try {
                const response = await fetch('/api/change_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        old_password: oldPass,
                        new_password: newPass
                    })
                });

                const result = await response.json();
                alert(result.message);

                if (result.success) {
                    e.target.reset();
                }
            } catch (error) {
                alert('Failed to update password');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // 3. Handle Logout (Corrected)
        // Ensure this ID matches the button in HTML
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();

                if (result.success) {
                    window.location.href = '/'; // Redirect to landing page
                }
            } catch (error) {
                console.error('Logout failed', error);
            }
        });
    </script>
</body>
</html>
